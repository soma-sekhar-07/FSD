<!DOCTYPE html>
<html>
<head>
    <title>HTML Table Example</title>
</head>
<body>

<h2 align="center">Student Details Table</h2>

<table border="2" align="center" cellpadding="10">

    <!-- Table Heading -->
    <tr>
        <th rowspan="2">S.No</th>
        <th rowspan="2">Name</th>
        <th colspan="2">Marks</th>
    </tr>

    <!-- Sub Heading -->
    <tr>
        <th>Maths</th>
        <th>Science</th>
    </tr>

    <!-- Row 1 -->
    <tr>
        <td>1</td>
        <td>Soma</td>
        <td>90</td>
        <td>85</td>
    </tr>

    <!-- Row 2 -->
    <tr>
        <td>2</td>
        <td>Dhoni</td>
        <td>88</td>
        <td>92</td>
    </tr>

    <!-- Row 3 with colspan -->
    <tr>
        <td>3</td>
        <td>Jadeja</td>
        <td colspan="2" align="center">Absent</td>
    </tr>

</table>

</body>
</html>
