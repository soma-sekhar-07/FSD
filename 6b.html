<!DOCTYPE html>
<html>
<head>
<title>JavaScript Output Methods</title>
</head>

<body>

<h2>JavaScript Output Methods</h2>

<p id="demo"></p>

<script>

document.write("This is output using document.write()<br>");

document.getElementById("demo").innerHTML="Output using innerHTML";

window.alert("This is an alert box output");

console.log("Output in browser console");

</script>
