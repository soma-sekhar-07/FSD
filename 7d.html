<html>
<head>
<title>Program Using Math Object Properties and Methods</title>
</head>

<body>

<script>
// Math Object Properties
document.write("Value of Pi: " + Math.PI + "<br>");
document.write("Value of Euler's Number (e): " + Math.E + "<br>");

// Math Object Methods
var number = 16;

// sqrt() method
document.write("Square Root of 16: " + Math.sqrt(number) + "<br>");

// pow() method
document.write("2 raised to 4: " + Math.pow(2, 4) + "<br>");

// round() method
document.write("Round 7.8: " + Math.round(7.8) + "<br>");

// random() method
document.write("Random Number (0 to 1): " + Math.random() + "<br>");

// floor() and ceil() methods
document.write("Floor of 7.8: " + Math.floor(7.8) + "<br>");
document.write("Ceil of 7.2: " + Math.ceil(7.2) + "<br>");
</script>

</body>
</html>
