<html>
<head>
<title>Program Using Array Object Properties and Methods</title>
</head>

<body>

<script>

// Creating an Array
var numbers = [10, 20, 30, 40];

// Array Property
document.write("Length of Array: " + numbers.length + "<br>");

// Array Methods
numbers.push(50);
document.write("After Push: " + numbers + "<br>");

numbers.pop();
document.write("After Pop: " + numbers + "<br>");

numbers.sort();
document.write("After Sort: " + numbers);

</script>

</body>
</html>
