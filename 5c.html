<!DOCTYPE html>
<html>
<head>
    <title>CSS Font and Text Properties</title>

    <style>
        /* 1. font-size */
        .size {
            font-size: 24px;
        }

        /* 2. font-weight */
        .weight {
            font-weight: bold;
        }

        /* 3. font-style */
        .style {
            font-style: italic;
        }

        /* 4. text-decoration */
        .decoration {
            text-decoration: underline;
        }

        /* 5. text-transform */
        .transform {
            text-transform: uppercase;
        }

        /* 6. text-align */
        .align {
            text-align: center;
        }
    </style>

</head>

<body>

    <h1>CSS Font and Text Properties Demo</h1>

    <p class="size">This text shows font-size property.</p>

    <p class="weight">This text shows font-weight property.</p>

    <p class="style">This text shows font-style property.</p>

    <p class="decoration">This text shows text-decoration property.</p>

    <p class="transform">This text shows text-transform property.</p>

    <p class="align">This text shows text-align property.</p>

</body>
</html>
