<!DOCTYPE html>
<html>
<head>
    <title>Image Gallery using Thumbnails</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }
        .gallery a img {
            width: 100px;
            height: 100px;
            border: 2px solid #555;
            border-radius: 8px;
            transition: 0.3s;
        }
        .gallery a img:hover {
            transform: scale(1.1);
            border-color: blue;
        }
    </style>
</head>
<body>

    <h1>Image Gallery</h1>
    <p>Click on any image to view full size</p>

    <div class="gallery">

        <!-- Image 1 -->
        <a href="images/image1.jpg" target="_blank">
            <img src="images/image1.jpg" alt="Image 1">
        </a>

        <!-- Image 2 -->
        <a href="images/image2.jpg" target="_blank">
            <img src="images/image2.jpg" alt="Image 2">
        </a>

        <!-- Image 3 -->
        <a href="images/image3.jpg" target="_blank">
            <img src="images/image3.jpg" alt="Image 3">
        </a>

        <!-- Image 4 -->
        <a href="images/image4.jpg" target="_blank">
            <img src="images/image4.jpg" alt="Image 4">
        </a>

    </div>

</body>
</html>
